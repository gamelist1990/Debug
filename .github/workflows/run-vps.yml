name: Run VPS Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 毎日UTC 00:00

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "scrapling[fetchers]" playwright
          # Local CAPTCHA solver deps (see extend-vps-exp/captcha_solver.py).
          pip install "tensorflow-cpu==2.19.0" "numpy<2.2" pillow

      - name: Install browsers (Playwright)
        run: python -m playwright install --with-deps

      - name: Install Scrapling browsers
        run: scrapling install

      - name: Install ffmpeg and Xvfb
        run: sudo apt-get update && sudo apt-get install -y ffmpeg xvfb

      - name: Install xdotool
        run: sudo apt-get install -y xdotool

      - name: Run script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          HEADLESS: "0"
          DEBUG_VIDEO: "1"
          DEBUG_ARTIFACTS_DIR: ${{ github.workspace }}/extend-vps-exp/artifacts
          DISPLAY: ":99"
          CAPTCHA_MODEL_PATH: ${{ github.workspace }}/xserver_captcha.keras
          TF_CPP_MIN_LOG_LEVEL: "2"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac -nolisten tcp &
          sleep 2
          # Warm up the virtual display with a real mouse move so CF sees prior activity.
          xdotool mousemove 640 400 || true
          sleep 1
          xdotool mousemove 800 500 || true
          cd extend-vps-exp && python main.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-debug-artifacts
          path: extend-vps-exp/artifacts
          if-no-files-found: ignore
